version: "3.8"

services:
  proxy:
    build:
      dockerfile: ./proxy/Dockerfile
      context: ./
    hostname: terrasearch-ai-proxy
    ports:
      - "8080:80"

  middleware:
    build: ./middleware
    hostname: terrasearch-ai-middleware
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - qdrant
    env_file:
      - .env

  redis:
    build: ./redis
    hostname: terrasearch-ai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  qdrant:
    build: ./qdrant
    hostname: terrasearch-ai-qdrant
    ports:
      - 6333:6333
      - 6334:6334
    expose:
      - 6333
      - 6334
      - 6335
    configs:
      - source: qdrant_config
        target: /qdrant/config/production.yaml
    volumes:
      - qdrant_data:/qdrant/storage

  postgres:
    build: ./postgres
    hostname: terrasearch-ai-postgres
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=langfuse
    volumes:
      - postgres:/var/lib/postgresql/data

  langfuse:
    build: ./langfuse
    hostname: terrasearch-ai-langfuse
    environment:
      DATABASE_URL: postgresql://admin:admin@postgres:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: mysecret
      SALT: mysalt
    ports:
      - "3000:3000"
    depends_on:
      - postgres

  ollama:
    build: ./ollama
    hostname: terrasearch-ai-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  frontend_static_content:
  redis_data:
  qdrant_data:
  postgres:
  ollama_data:

configs:
  qdrant_config:
    content: |
      log_level: INFO       